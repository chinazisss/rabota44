<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учёт экспериментов</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [experiments, setExperiments] = React.useState([]);
            const [newName, setNewName] = React.useState('');
            const [newStatus, setNewStatus] = React.useState('План');
            const [filterStatus, setFilterStatus] = React.useState('Все');

            const addExperiment = () => {
                const trimmed = newName.trim();
                if (!trimmed) return;
                const newExp = {
                    id: Date.now() + Math.random().toString(36),
                    name: trimmed,
                    status: newStatus
                };
                setExperiments(prev => [...prev, newExp]);
                setNewName('');
            };

            const deleteExperiment = (id) => {
                setExperiments(prev => prev.filter(exp => exp.id !== id));
            };

            const filteredExperiments = React.useMemo(() => {
                if (filterStatus === 'Все') return experiments;
                return experiments.filter(exp => exp.status === filterStatus);
            }, [experiments, filterStatus]);

            const completedCount = React.useMemo(() => {
                return experiments.filter(exp => exp.status === 'Завершён').length;
            }, [experiments]);

            return (
                <div>
                    <h1> Учёт экспериментов</h1>
                    <div>
                        <input
                            type="text"
                            placeholder="Название эксперимента"
                            value={newName}
                            onChange={(e) => setNewName(e.target.value)}
                        />
                        <select value={newStatus} onChange={(e) => setNewStatus(e.target.value)}>
                            <option value="План"> План</option>
                            <option value="В процессе"> В процессе</option>
                            <option value="Завершён"> Завершён</option>
                        </select>
                        <button onClick={addExperiment}>+ Добавить</button>
                    </div>
                    <div>
                        {['Все', 'План', 'В процессе', 'Завершён'].map(status => (
                            <button
                                key={status}
                                onClick={() => setFilterStatus(status)}
                                style={{ fontWeight: filterStatus === status ? 'bold' : 'normal' }}
                            >
                                {status === 'Все' ? ' Все' : status}
                            </button>
                        ))}
                    </div>
                    <div> Завершено: {completedCount}</div>
                    <ul>
                        {filteredExperiments.map(exp => (
                            <li key={exp.id}>
                                {exp.name} — {exp.status}
                                <button onClick={() => deleteExperiment(exp.id)}>🗑-</button>
                            </li>
                        ))}
                    </ul>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
